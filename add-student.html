<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add student</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <nav>
        <ul>
            <a href="dashboard.html">Dashdoard</a>
            <a href="add-student.html">Add Student</a>
            <a href="view-student.html">View Students</a>
            <a href="logout.html">Logout</a>
        </ul>
    </nav>
    <div id="f">
        <form  action="view-student.html">
            <h1>Add student</h1>
        <label for="Name">Name:</label>
        <input type="text" required placeholder="Enter student Name">
        <br><br>
        <label for="Roll No">Roll No:</label>
        <input type="text" required placeholder="Enter Roll No">
        <br><br>
        <label for="Branch">Branch:</label>
        <input type="text" required placeholder="Enter Branch">
        <br><br>
        <label for="CGPA">CGPA:</label>
        <input type="number" pattern="/^[1-10]/" min="0" max="10" required placeholder="Enter your cgpa">
        <br><br>
        <div id="btn">
            <button type="submit">Add Student</button>
        </div>
    </form>
    </div>
    
</body>
</html>
