<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <nav>
        <ul>
            <a href="index.html">Home</a>
            <a href="login.html">login</a>
            <a href="register.html">register</a>
        </ul>
    </nav>
    <div id="f">
        <form method="get" onsubmit=validateForm() action="login.html">
            <h1>Registration</h1>
            <label for="name">Name:</label>
            <input type="text" id="name" required placeholder="Enter your Name">
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="Enter your email">
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Enter your Password">
            <br><br>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" required placeholder="Enter your Password again">
            <br><br>
            <div id="btn">
                <button type="submit">Register</button>
            </div>
            <p>Already have an account!</p>
            <a href="login.html" style="color:blue; text-decoration: underline;">Login</a>
        </form>
    </div>
</body>

</html>
